name: Front-End CI Testing

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Muat turun kod projek
        uses: actions/checkout@v4

      - name: Pasang Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pasang dependencies
        run: npm install

      - name: Jalankan unit test
        run: npm test
